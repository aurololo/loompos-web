<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#0F0F10"/>
  <!-- four horizontal white pill-bars (weft) -->
  <g fill="#FFFFFF" opacity="0.92">
    <rect x="3"  y="6"  width="26" height="3" rx="1.5"/>
    <rect x="3"  y="11" width="26" height="3" rx="1.5"/>
    <rect x="3"  y="18" width="26" height="3" rx="1.5"/>
    <rect x="3"  y="23" width="26" height="3" rx="1.5"/>
  </g>
  <!-- four vertical brand-green pill-bars (warp) overlaid on top -->
  <g fill="#7D9772">
    <rect x="6"  y="3"  width="3" height="26" rx="1.5"/>
    <rect x="11" y="3"  width="3" height="26" rx="1.5"/>
    <rect x="18" y="3"  width="3" height="26" rx="1.5"/>
    <rect x="23" y="3"  width="3" height="26" rx="1.5"/>
  </g>
</svg>
