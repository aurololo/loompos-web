<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="112" fill="#0F0F10"/>
  <!-- four horizontal white pill-bars (weft) -->
  <g fill="#FFFFFF" opacity="0.92">
    <rect x="48"  y="100" width="416" height="48" rx="24"/>
    <rect x="48"  y="180" width="416" height="48" rx="24"/>
    <rect x="48"  y="284" width="416" height="48" rx="24"/>
    <rect x="48"  y="364" width="416" height="48" rx="24"/>
  </g>
  <!-- four vertical brand-green pill-bars (warp) overlaid on top -->
  <g fill="#7D9772">
    <rect x="100" y="48" width="48" height="416" rx="24"/>
    <rect x="180" y="48" width="48" height="416" rx="24"/>
    <rect x="284" y="48" width="48" height="416" rx="24"/>
    <rect x="364" y="48" width="48" height="416" rx="24"/>
  </g>
</svg>
